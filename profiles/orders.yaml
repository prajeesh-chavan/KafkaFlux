entity: orders
topic: "telemetry.ecommerce.orders"
target_eps: 50
dynamic_scaling: true

chaos:
  drop_percentage: 1.0
  corrupt_fields: {}

fields:
  order_id:
    type: uuid
    publish_to: orders

  order_number:
    type: int

  customer_id:
    type: pool
    pool: customers

  sales_channel_id:
    type: uuid

  order_status:
    type: weighted
    values:
      CREATED: 20
      CONFIRMED: 20
      PROCESSING: 25
      COMPLETED: 30
      CANCELLED: 5

  payment_status:
    type: weighted
    values:
      PENDING: 20
      PAID: 70
      FAILED: 10

  fulfillment_status:
    type: weighted
    values:
      UNFULFILLED: 30
      FULFILLED: 70

  currency_code:
    type: weighted
    values:
      USD: 50
      INR: 50

  subtotal_amount:
    type: float

  shipping_amount:
    type: normal
    mean: 15.0
    stddev: 3.5
    min: 0.0

  tax_amount:
    type: normal
    mean: 8.5
    stddev: 2.0
    min: 1.0

  discount_amount:
    type: range
    min: 0
    max: 25

  placed_at:
    type: timestamp

  created_at:
    type: timestamp

  completed_at:
    type: conditional
    rules:
      - when: order_status == COMPLETED
        then:
          type: timestamp

  cancelled_at:
    type: conditional
    rules:
      - when: order_status == CANCELLED
        then:
          type: timestamp
