entity: customers
topic: "telemetry.ecommerce.customers"
target_eps: 10
dynamic_scaling: false

chaos:
  drop_percentage: 0.0
  corrupt_fields: {}

fields:
  customer_id:
    type: uuid
    publish_to: customers

  first_name:
    type: first_name

  last_name:
    type: last_name

  email:
    type: email

  phone:
    type: phone

  date_of_birth:
    type: birth_date

  customer_status:
    type: weighted
    values:
      ACTIVE: 80
      INACTIVE: 15
      BLOCKED: 5

  customer_type:
    type: weighted
    values:
      INDIVIDUAL: 70
      BUSINESS: 30

  registered_at:
    type: past_timestamp

  created_at:
    type: timestamp

  updated_at:
    type: timestamp

  is_deleted:
    type: weighted
    values:
      "false": 98
      "true": 2
