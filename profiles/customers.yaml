entity: customers
topic: "telemetry.ecommerce.customers"
target_eps: 1
dynamic_scaling: false

chaos:
  drop_percentage: 0.0
  corrupt_fields: {}

fields:
  customer_id:
    type: uuid
    publish_to: customers

  first_name:
    type: first_name

  last_name:
    type: last_name

  email:
    type: email

  phone:
    type: phone

  customer_status:
    type: weighted
    values:
      ACTIVE: 85
      INACTIVE: 10
      BLOCKED: 5

  registered_at:
    type: timestamp

  created_at:
    type: timestamp

  updated_at:
    type: timestamp

  is_deleted:
    type: weighted
    values:
      "false": 98
      "true": 2
