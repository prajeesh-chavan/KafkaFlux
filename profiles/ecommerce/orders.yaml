entity: orders
topic: "telemetry.ecommerce.orders"
target_eps: 50
dynamic_scaling: true

chaos:
  drop_percentage: 1.0
  corrupt_fields: {}

fields:
  order_id:
    type: uuid
    publish_to: orders

  customer_id:
    type: pool
    pool: customers

  sales_channel_id:
    type: pool
    pool: sales_channels

  order_number:
    type: int

  order_status:
    type: weighted
    values:
      PLACED: 15
      CONFIRMED: 15
      PROCESSING: 20
      SHIPPED: 20
      DELIVERED: 25
      CANCELLED: 4
      RETURNED: 1

  fulfillment_status:
    type: weighted
    values:
      NONE: 20
      PARTIAL: 25
      COMPLETE: 55

  payment_status:
    type: weighted
    values:
      PENDING: 15
      AUTHORIZED: 10
      PAID: 55
      PARTIALLY_PAID: 5
      REFUNDED: 10
      PARTIALLY_REFUNDED: 5

  order_timestamp:
    type: past_timestamp

  currency_code:
    type: weighted
    values:
      USD: 50
      INR: 30
      EUR: 10
      GBP: 5
      JPY: 5

  subtotal_amount:
    type: float

  discount_amount:
    type: range
    min: 0
    max: 25

  tax_amount:
    type: normal
    mean: 15.0
    stddev: 5.0
    min: 1.0

  shipping_amount:
    type: normal
    mean: 12.0
    stddev: 4.0
    min: 0.0

  total_amount:
    type: normal
    mean: 250.0
    stddev: 100.0
    min: 1.0

  created_at:
    type: timestamp

  updated_at:
    type: timestamp

  is_deleted:
    type: weighted
    values:
      "false": 99
      "true": 1
