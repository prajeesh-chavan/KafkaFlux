entity: categories
topic: "telemetry.ecommerce.categories"
target_eps: 1
dynamic_scaling: false

chaos:
  drop_percentage: 0.0
  corrupt_fields: {}

fields:
  category_id:
    type: uuid
    publish_to: categories

  category_name:
    type: word

  parent_category_id:
    type: pool
    pool: categories

  description:
    type: sentence

  is_active:
    type: weighted
    values:
      "false": 5
      "true": 95

  created_at:
    type: timestamp

  updated_at:
    type: timestamp

  is_deleted:
    type: weighted
    values:
      "false": 98
      "true": 2
