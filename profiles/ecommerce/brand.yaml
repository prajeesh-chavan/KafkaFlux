entity: brand
topic: "telemetry.ecommerce.brand"
target_eps: 1
dynamic_scaling: false

chaos:
  drop_percentage: 0.0
  corrupt_fields: {}

fields:
  brand_id:
    type: uuid
    publish_to: brands

  brand_name:
    type: company

  description:
    type: sentence

  is_active:
    type: weighted
    values:
      "false": 5
      "true": 95

  created_at:
    type: timestamp

  updated_at:
    type: timestamp

  is_deleted:
    type: weighted
    values:
      "false": 99
      "true": 1
