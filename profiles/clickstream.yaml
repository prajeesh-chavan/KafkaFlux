entity: clickstream
topic: telemetry.ecommerce.clickstream
target_eps: 10
dynamic_scaling: true
chaos:
  drop_percentage: 5.5
  corrupt_fields:
    session_id:
      rate: 2.0
    page:
      rate: 3.0
fields:
  session_id:
    - value: "uuid"
      state_pool: "active_sessions"
      state_action: "publish"
  page:
    - value: "home"