entity: inventory
topic: "telemetry.ecommerce.inventory"
target_eps: 20
dynamic_scaling: false

chaos:
  drop_percentage: 0.0
  corrupt_fields: {}

fields:
  inventory_id:
    type: uuid
    publish_to: inventory

  warehouse_id:
    type: pool
    pool: warehouses

  variant_id:
    type: pool
    pool: product_variants

  quantity_on_hand:
    type: poisson
    lambda: 50.0

  quantity_reserved:
    type: range
    min: 0
    max: 20

  reorder_level:
    type: range
    min: 10
    max: 50

  last_stock_update_at:
    type: past_timestamp

  created_at:
    type: timestamp

  updated_at:
    type: timestamp
