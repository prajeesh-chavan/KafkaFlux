entity: inventory
topic: "telemetry.ecommerce.inventory"
target_eps: 20
dynamic_scaling: false

chaos:
  drop_percentage: 0.0
  corrupt_fields: {}

fields:
  inventory_id:
    type: uuid

  product_variant_id:
    type: pool
    pool: product_variants

  warehouse_id:
    type: uuid

  available_quantity:
    type: poisson
    lambda: 150.0

  reserved_quantity:
    type: range
    min: 0
    max: 15

  safety_stock_quantity:
    value: 20

  updated_at:
    type: timestamp
