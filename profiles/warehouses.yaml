entity: warehouses
topic: "telemetry.ecommerce.warehouses"
target_eps: 1
dynamic_scaling: false

chaos:
  drop_percentage: 0.0
  corrupt_fields: {}

fields:
  warehouse_id:
    type: uuid
    publish_to: warehouses

  warehouse_code:
    type: sku

  warehouse_name:
    type: company

  address_id:
    type: pool
    pool: addresses

  warehouse_status:
    type: weighted
    values:
      ACTIVE: 85
      INACTIVE: 10
      CLOSED: 5

  created_at:
    type: timestamp

  updated_at:
    type: timestamp

  is_deleted:
    type: weighted
    values:
      "false": 98
      "true": 2
