entity: return_items
topic: "telemetry.ecommerce.return_items"
target_eps: 8
dynamic_scaling: false

chaos:
  drop_percentage: 0.0
  corrupt_fields: {}

fields:
  return_item_id:
    type: uuid

  return_id:
    type: pool
    pool: returns

  order_item_id:
    type: pool
    pool: order_items

  quantity_returned:
    type: range
    min: 1
    max: 3

  return_reason:
    type: weighted
    values:
      "Product damaged": 25
      "Wrong item delivered": 20
      "Size or fit issue": 20
      "Item not as described": 15
      "Quality issue": 10
      "Defective product": 10

  item_condition:
    type: weighted
    values:
      NEW: 30
      USED: 35
      DAMAGED: 20
      DEFECTIVE: 15

  disposition:
    type: weighted
    values:
      RESTOCK: 40
      REPAIR: 15
      DONATE: 10
      DISPOSE: 20
      RETURN_TO_VENDOR: 15

  refund_amount:
    type: float

  created_at:
    type: timestamp

  updated_at:
    type: timestamp
