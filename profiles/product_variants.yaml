entity: product_variants
topic: "telemetry.ecommerce.product_variants"
target_eps: 30
dynamic_scaling: false

chaos:
  drop_percentage: 0.0
  corrupt_fields: {}

fields:
  variant_id:
    type: uuid
    publish_to: product_variants

  product_id:
    type: pool
    pool: products

  sku:
    type: sku

  barcode:
    type: uuid

  color:
    type: weighted
    values:
      "Black": 25
      "White": 20
      "Red": 10
      "Blue": 15
      "Green": 10
      "Silver": 10
      "Gold": 5
      "Rose Gold": 5

  size:
    type: weighted
    values:
      "XS": 10
      "S": 20
      "M": 30
      "L": 25
      "XL": 10
      "XXL": 5

  unit_price:
    type: normal
    mean: 50.0
    stddev: 20.0
    min: 5.0

  created_at:
    type: timestamp

  updated_at:
    type: timestamp

  is_deleted:
    type: weighted
    values:
      "false": 95
      "true": 5
