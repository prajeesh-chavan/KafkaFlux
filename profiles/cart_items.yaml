entity: cart_items
topic: "telemetry.ecommerce.cart_items"
target_eps: 60
dynamic_scaling: false

chaos:
  drop_percentage: 0.0
  corrupt_fields: {}

fields:
  cart_item_id:
    type: uuid

  cart_id:
    type: pool
    pool: carts

  variant_id:
    type: pool
    pool: product_variants

  quantity:
    type: range
    min: 1
    max: 10

  unit_price:
    type: normal
    mean: 50.0
    stddev: 20.0
    min: 5.0

  created_at:
    type: timestamp

  updated_at:
    type: timestamp
