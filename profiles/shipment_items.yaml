entity: shipment_items
topic: "telemetry.ecommerce.shipment_items"
target_eps: 30
dynamic_scaling: false

chaos:
  drop_percentage: 0.0
  corrupt_fields: {}

fields:
  shipment_item_id:
    type: uuid

  shipment_id:
    type: pool
    pool: shipments

  order_item_id:
    type: pool
    pool: order_items

  quantity_shipped:
    type: range
    min: 1
    max: 5

  created_at:
    type: timestamp

  updated_at:
    type: timestamp
