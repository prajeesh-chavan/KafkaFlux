entity: customer_events
topic: "telemetry.ecommerce.customer_events"
target_eps: 200
dynamic_scaling: true

chaos:
  drop_percentage: 0.5
  corrupt_fields: {}

fields:
  event_id:
    type: uuid

  customer_id:
    type: weighted
    values:
      "pool(customers)": 90
      "null": 10

  session_id:
    type: uuid

  event_type:
    type: weighted
    values:
      PRODUCT_VIEW: 50
      SEARCH: 25
      ADD_TO_CART: 15
      CHECKOUT_STARTED: 8
      ORDER_PLACED: 2

  event_source:
    type: weighted
    values:
      WEBSITE: 70
      MOBILE_APP: 30

  device_type:
    type: weighted
    values:
      DESKTOP: 40
      MOBILE: 55
      TABLET: 5

  occurred_at:
    type: timestamp
